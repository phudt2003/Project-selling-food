services:
  - type: web
    name: websitesellfood-web
    runtime: docker
    plan: starter
    region: singapore
    dockerfilePath: ./Dockerfile
    dockerContext: .
    preDeployCommand: php artisan migrate --force && php artisan db:seed --force
    healthCheckPath: /healthz
    envVars:
      - key: APP_NAME
        value: Website Selling Food
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: ASSET_URL
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: PORT
        value: "10000"
      - key: NGINX_CLIENT_MAX_BODY_SIZE
        value: 25m
      - key: MOMO_PARTNER_CODE
        sync: false
      - key: MOMO_ACCESS_KEY
        sync: false
      - key: MOMO_SECRET_KEY
        sync: false
      - key: CACHE_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: SESSION_DRIVER
        value: file
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: websitesellfood-db
          property: connectionString
      - key: DB_HOST
        fromDatabase:
          name: websitesellfood-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: websitesellfood-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: websitesellfood-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: websitesellfood-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: websitesellfood-db
          property: password
databases:
  - name: websitesellfood-db
    databaseName: websitesellfood
    user: websitesellfood
    plan: starter
    region: singapore
